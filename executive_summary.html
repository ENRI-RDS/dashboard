<!DOCTYPE html>
<html lang="it" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENRI — Executive Summary</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- ✅ STILE GANTT APPLE-LIKE CHIARO -->
<style>
body {
    font-family: "DM Sans", sans-serif;
    background: #f5f6f8;
    padding: 28px;
    color: #222;
}

/* ——— CARD ——— */
.card {
    background: #ffffff;
    border: 1px solid #dadce0;
    border-radius: 14px;
    padding: 18px;
    box-shadow: 0 3px 12px #0000000d;
    margin-bottom: 28px;
}

/* ——— TITOLO ——— */
.title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
}

/* ——— GANTT ——— */
.gantt-wrapper {
    width: 100%;
    background: #ffffff;
    border: 1px solid #dadce0;
    border-radius: 14px;
    overflow: hidden;
    font-family: "DM Sans", sans-serif;
    box-shadow: 0 4px 14px #0000000c;
    margin-top: 14px;
}

.gantt-header {
    display: grid;
    grid-auto-flow: column;
    background: linear-gradient(#f4f6fa, #e8ecf3);
    border-bottom: 1px solid #d0d3da;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    color: #3b4658;
}

.gantt-header div {
    padding: 6px 0;
    border-left: 1px solid #d7d9e0;
}

.gantt-row {
    display: grid;
    grid-template-columns: 260px 1fr;
    border-bottom: 1px solid #f0f0f3;
    background: #ffffff;
}

.gantt-row:nth-child(even) {
    background: #f8f9fb;
}

.gantt-label {
    padding: 10px 14px;
    font-size: 13px;
    color: #2a2f35;
    border-right: 1px solid #ececec;
    display: flex;
    align-items: center;
}

/* TRACK */
.gantt-track {
    position: relative;
    height: 32px;
    margin: 6px;
    background: repeating-linear-gradient(
        to right,
        transparent 0,
        transparent calc(var(--cellW) - 1px),
        #e4e7ef calc(var(--cellW) - 1px),
        #e4e7ef var(--cellW)
    );
    border-radius: 6px;
}

/* Baseline */
.gantt-baseline {
    position: absolute;
    height: 6px;
    background: #cdd1d6;
    border-radius: 3px;
    top: 13px;
}

/* Progress */
.gantt-progress {
    position: absolute;
    height: 14px;
    top: 9px;
    border-radius: 7px;
}

/* Percentuale */
.gantt-pct {
    position: absolute;
    right: 6px;
    top: 6px;
    font-size: 11px;
    font-weight: 700;
    color: #222;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">Executive Summary — Gantt di Avanzamento</div>
    <div style="font-size:13px;color:#555">
        Tutti i valori sono calcolati automaticamente a partire dai dati della dashboard principale (index.html).
    </div>
</div>

<!-- ✅ CONTENITORE DEL GANTT -->
<div class="card">
    <div class="title">Gantt di Progetto (CL1 + CL2)</div>
    <div id="ganttContainer"></div>
</div>

<!-- ✅ JS GANTT -->
<script>
/* ============================================================
   GANTT Apple‑Like — usa i dati reali forniti dall'INDEX
   ============================================================ */

async function initExecutiveGantt() {
    if (!window.dataEngine) {
        console.error("window.dataEngine non trovato — verifica blocco export in index.html");
        document.getElementById("ganttContainer").innerHTML =
            "<div style='color:red;font-weight:600'>ERRORE: dataEngine non rilevato</div>";
        return;
    }

    // ✅ Carico i dati reali dell’index
    const raw = await window.dataEngine.loadAllCSV();

    // ✅ Ottengo cluster stats (submissionPct, approvalPct…)
    const clusterStats = window.dataEngine.computeClusterStats(raw);

    // ✅ Ottengo modello “pulito” per il Gantt
    const ganttStats = window.dataEngine.computeGanttStats();

    const model = buildGanttModel(ganttStats);

    renderModernGantt(model);
}

/* ============================================================
   MODELLO GANTT
   ============================================================ */
function buildGanttModel(stats) {

    const cl1 = stats["1"] || {submissionPct:0, approvalPct:0};
    const cl2 = stats["2"] || {submissionPct:0, approvalPct:0};

    return [
        { label: "CLUSTER 1 — Design & Permitting submission", start:0, end:5, pct:cl1.submissionPct, color:"#f4b942" },
        { label: "CLUSTER 1 — Permitting approval",             start:5, end:12, pct:cl1.approvalPct,   color:"#9bd48a" },

        { label: "CLUSTER 2 — Design & Permitting submission", start:0, end:5, pct:cl2.submissionPct, color:"#f4b942" },
        { label: "CLUSTER 2 — Permitting approval",             start:5, end:12, pct:cl2.approvalPct,   color:"#9bd48a" }
    ];
}

/* ============================================================
   RENDER
   ============================================================ */
function renderModernGantt(data) {

    const months = [
        "Feb‑26","Mar‑26","Apr‑26","Mag‑26","Giu‑26",
        "Lug‑26","Ago‑26","Set‑26","Ott‑26","Nov‑26",
        "Dic‑26","Gen‑27"
    ];

    const cellW = 54;
    document.documentElement.style.setProperty('--cellW', cellW + 'px');

    const container = document.getElementById("ganttContainer");
    if (!container) return;

    let html = `<div class="gantt-wrapper">`;

    /* Header */
    html += `<div class="gantt-header">`;
    months.forEach(m => html += `<div style="width:${cellW}px">${m}</div>`);
    html += `</div>`;

    /* Rows */
    data.forEach(row => {
        const left = row.start * cellW;
        const fullWidth = (row.end - row.start) * cellW;
        const done = fullWidth * (row.pct / 100);

        html += `
        <div class="gantt-row">
            <div class="gantt-label">${row.label}</div>

            <div class="gantt-track">
                <div class="gantt-baseline"
                    style="left:${left}px;width:${fullWidth}px"></div>

                <div class="gantt-progress"
                    style="left:${left}px;width:${done}px;background:${row.color}"></div>

                <div class="gantt-pct">${row.pct.toFixed(0)}%</div>
            </div>
        </div>`;
    });

    html += `</div>`;
    container.innerHTML = html;
}

/* AUTO-INIT */
initExecutiveGantt();
</script>

</body>
</html>
``
