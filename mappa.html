<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mappa Avanzamento</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1117;
color:white;
}

#map{
height:100vh;
width:100%;
}

.topbar{
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:#1a1d27;
padding:10px 15px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

</style>
</head>

<body>

<div class="topbar">
<b>PROGETTO ENRI</b><br>
Mappa avanzamento autorizzazioni
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const STATO_COLORI = {

"IN ATTESA":"#4a4f6a",
"IN REDAZIONE":"#c9a227",
"IN FIRMA RDS":"#e07b3a",
"INVIATO":"#4f8ef7",
"PROTOCOLLATO":"#2f5496",
"NECESSARIA INTEGRAZIONE":"#cc3333",
"PROTOCOLLATO INTEGRAZIONE":"#548235",
"OTTENUTO":"#3a8c5c"

}

function colore(stato){
return STATO_COLORI[stato] || "#4a4f6a"
}

const map = L.map('map').setView([45.4,9.2],9)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ attribution:'© OpenStreetMap'}
).addTo(map)


function popupHTML(p){

return `
<b>Lotto:</b> ${p.LOTTO || "-"}<br>
<b>Comune:</b> ${p.COMUNE || "-"}<br>
<b>Provincia:</b> ${p.PROVINCIA || "-"}<br>
<b>Ente:</b> ${p.ENTE || "-"}<br>
<b>Tipologia:</b> ${p.TIPOLOGIA || "-"}<br>
<b>Stato:</b> ${p.STATO_AUTORIZZAZIONE || "-"}
`

}

async function carica(){

try{

const res = await fetch("QGIS.geojson")

const geo = await res.json()

const layer = L.geoJSON(geo,{

style:function(f){

return{
color:colore(f.properties.STATO_AUTORIZZAZIONE),
weight:4
}

},

onEachFeature:function(feature,layer){

layer.bindPopup(
popupHTML(feature.properties)
)

}

})

layer.addTo(map)

map.fitBounds(layer.getBounds())

}

catch(err){

alert("Errore caricamento GeoJSON")

console.error(err)

}

}

carica()

</script>

</body>
</html>
